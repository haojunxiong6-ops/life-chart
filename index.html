<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生K线图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #ff6600;
            --primary-dark: #cc5200;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #2a2a2a;
            --emotion: #00ff00;
            --wealth: #ffaa00;
            --cognition: #4488ff;
            --life: #ff6600;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .chat-container {
            height: 350px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 90%;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.ai {
            background: var(--border);
            margin-right: auto;
        }
        
        .message.user {
            background: var(--primary);
            margin-left: auto;
        }
        
        .question-block {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid var(--border);
        }
        
        .question-title {
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--primary);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option {
            padding: 10px 14px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option:hover {
            border-color: var(--primary);
            background: rgba(255, 102, 0, 0.1);
        }
        
        .option.selected {
            border-color: var(--primary);
            background: rgba(255, 102, 0, 0.2);
        }
        
        .input-group {
            margin: 12px 0;
        }
        
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: var(--border);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
        }
        
        .status-dot.waiting {
            background: #ffaa00;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .charts-container {
            display: grid;
            gap: 20px;
        }
        
        .chart-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        
        .chart-title {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--text-muted);
        }
        
        /* 详细评估结果样式 */
        .evaluation-result {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .result-phase {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .result-phase.peak { background: linear-gradient(135deg, #00ff00, #00cc00); color: #000; }
        .result-phase.valley { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; }
        .result-phase.flat { background: linear-gradient(135deg, #4488ff, #2266cc); color: #fff; }
        .result-phase.rise { background: linear-gradient(135deg, #00ccff, #0099cc); color: #000; }
        .result-phase.fall { background: linear-gradient(135deg, #ffaa00, #cc8800); color: #000; }
        
        .result-summary {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        /* 雷达图区域 */
        .radar-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        /* 维度详细卡片 */
        .dimension-detail {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .dimension-detail {
                grid-template-columns: 1fr;
            }
        }
        
        .dimension-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid;
        }
        
        .dimension-card.emotion { border-color: var(--emotion); }
        .dimension-card.wealth { border-color: var(--wealth); }
        .dimension-card.cognition { border-color: var(--cognition); }
        .dimension-card.life { border-color: var(--life); }
        
        .dimension-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .dimension-name {
            font-weight: 500;
            font-size: 1rem;
        }
        
        .dimension-score {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .dimension-card.emotion .dimension-score { color: var(--emotion); }
        .dimension-card.wealth .dimension-score { color: var(--wealth); }
        .dimension-card.cognition .dimension-score { color: var(--cognition); }
        .dimension-card.life .dimension-score { color: var(--life); }
        
        .dimension-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .dimension-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .dimension-card.emotion .dimension-fill { background: var(--emotion); }
        .dimension-card.wealth .dimension-fill { background: var(--wealth); }
        .dimension-card.cognition .dimension-fill { background: var(--cognition); }
        .dimension-card.life .dimension-fill { background: var(--life); }
        
        .dimension-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        
        .phase-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 20px;
        }
        
        .history-item {
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .history-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .rating-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        
        .rating-btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .rating-btn:hover {
            border-color: var(--primary);
        }
        
        .rating-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .dimension-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .dimension-tab {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .dimension-tab:hover {
            border-color: var(--primary);
        }
        
        .dimension-tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .completion-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #00cc00;
            color: #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .dimension-tab-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>人生K线图</h1>
            <p class="subtitle">AI智能评估 · 洞察人生轨迹</p>
        </header>
        
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">准备就绪</span>
        </div>
        
        <div class="main-content">
            <div class="card">
                <div class="card-title">问卷调查</div>
                <div class="dimension-tabs" id="dimensionTabs">
                    <div class="dimension-tab-wrapper">
                        <div class="dimension-tab active" data-dimension="emotion" onclick="switchDimension('emotion')">情绪状态</div>
                    </div>
                    <div class="dimension-tab-wrapper">
                        <div class="dimension-tab" data-dimension="wealth" onclick="switchDimension('wealth')">财富状况</div>
                    </div>
                    <div class="dimension-tab-wrapper">
                        <div class="dimension-tab" data-dimension="cognition" onclick="switchDimension('cognition')">认知水平</div>
                    </div>
                    <div class="dimension-tab-wrapper">
                        <div class="dimension-tab" data-dimension="life" onclick="switchDimension('life')">生活满意度</div>
                    </div>
                    <div class="dimension-tab-wrapper">
                        <div class="dimension-tab" data-dimension="daily" onclick="showDaily()">每日打卡</div>
                    </div>
                </div>
                
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai">
                            你好！我是人生K线图AI助手 🚀
                            <br><br>
                            我将通过问卷调查了解你的四个维度：
                            <br>• 情绪状态 · 财富状况 · 认知水平 · 生活满意度
                            <br><br>
                            <strong>点击「开始评估」按钮开始答题吧！</strong>
                        </div>
                    </div>
                </div>
                
                <div id="questionArea" style="display: none;">
                    <div id="questionsContainer"></div>
                    <div style="margin-top: 16px;">
                        <button class="btn" id="submitBtn" onclick="submitAnswers()">提交评估</button>
                        <button class="btn btn-secondary" onclick="resetQuestionnaire()" style="margin-left: 10px;">重置</button>
                    </div>
                </div>
                
                <div id="startArea" style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="startQuestionnaire()">开始评估</button>
                </div>
                
                <div id="dailyArea" style="display: none; margin-top: 20px;">
                    <div class="question-block">
                        <div class="question-title">📅 今日打卡</div>
                        
                        <div class="input-group">
                            <label class="input-label">今日工作状态</label>
                            <div class="rating-group" id="workRating">
                                <div class="rating-btn" data-value="A" onclick="selectRating('work', 'A')">A - 非常出色</div>
                                <div class="rating-btn" data-value="B" onclick="selectRating('work', 'B')">B - 良好</div>
                                <div class="rating-btn" data-value="C" onclick="selectRating('work', 'C')">C - 一般</div>
                                <div class="rating-btn" data-value="D" onclick="selectRating('work', 'D')">D - 较差</div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label class="input-label">压力程度 (1-10)</label>
                            <div class="rating-group" id="stressRating">
                                <div class="rating-btn" data-value="1" onclick="selectRating('stress', 1)">1</div>
                                <div class="rating-btn" data-value="2" onclick="selectRating('stress', 2)">2</div>
                                <div class="rating-btn" data-value="3" onclick="selectRating('stress', 3)">3</div>
                                <div class="rating-btn" data-value="4" onclick="selectRating('stress', 4)">4</div>
                                <div class="rating-btn" data-value="5" onclick="selectRating('stress', 5)">5</div>
                                <div class="rating-btn" data-value="6" onclick="selectRating('stress', 6)">6</div>
                                <div class="rating-btn" data-value="7" onclick="selectRating('stress', 7)">7</div>
                                <div class="rating-btn" data-value="8" onclick="selectRating('stress', 8)">8</div>
                                <div class="rating-btn" data-value="9" onclick="selectRating('stress', 9)">9</div>
                                <div class="rating-btn" data-value="10" onclick="selectRating('stress', 10)">10</div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label class="input-label">幸福程度 (1-10)</label>
                            <div class="rating-group" id="happinessRating">
                                <div class="rating-btn" data-value="1" onclick="selectRating('happiness', 1)">1</div>
                                <div class="rating-btn" data-value="2" onclick="selectRating('happiness', 2)">2</div>
                                <div class="rating-btn" data-value="3" onclick="selectRating('happiness', 3)">3</div>
                                <div class="rating-btn" data-value="4" onclick="selectRating('happiness', 4)">4</div>
                                <div class="rating-btn" data-value="5" onclick="selectRating('happiness', 5)">5</div>
                                <div class="rating-btn" data-value="6" onclick="selectRating('happiness', 6)">6</div>
                                <div class="rating-btn" data-value="7" onclick="selectRating('happiness', 7)">7</div>
                                <div class="rating-btn" data-value="8" onclick="selectRating('happiness', 8)">8</div>
                                <div class="rating-btn" data-value="9" onclick="selectRating('happiness', 9)">9</div>
                                <div class="rating-btn" data-value="10" onclick="selectRating('happiness', 10)">10</div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label class="input-label">成长进度 (1-10)</label>
                            <div class="rating-group" id="growthRating">
                                <div class="rating-btn" data-value="1" onclick="selectRating('growth', 1)">1</div>
                                <div class="rating-btn" data-value="2" onclick="selectRating('growth', 2)">2</div>
                                <div class="rating-btn" data-value="3" onclick="selectRating('growth', 3)">3</div>
                                <div class="rating-btn" data-value="4" onclick="selectRating('growth', 4)">4</div>
                                <div class="rating-btn" data-value="5" onclick="selectRating('growth', 5)">5</div>
                                <div class="rating-btn" data-value="6" onclick="selectRating('growth', 6)">6</div>
                                <div class="rating-btn" data-value="7" onclick="selectRating('growth', 7)">7</div>
                                <div class="rating-btn" data-value="8" onclick="selectRating('growth', 8)">8</div>
                                <div class="rating-btn" data-value="9" onclick="selectRating('growth', 9)">9</div>
                                <div class="rating-btn" data-value="10" onclick="selectRating('growth', 10)">10</div>
                            </div>
                        </div>
                        
                        <button class="btn" onclick="submitDailyCheck()">提交今日打卡</button>
                    </div>
                </div>
            </div>
            
            <div class="charts-container">
                <div class="chart-wrapper">
                    <div class="chart-title">人生K线图</div>
                    <canvas id="kLineChart" height="200"></canvas>
                </div>
                
                <div class="evaluation-result" id="evaluationResult" style="display: none;">
                    <div class="result-header">
                        <span class="result-phase" id="phaseBadge">-</span>
                        <div class="result-summary" id="phaseSummary"></div>
                    </div>
                    
                    <div class="radar-container">
                        <canvas id="radarChart" width="280" height="280"></canvas>
                    </div>
                    
                    <div class="dimension-detail" id="dimensionDetail">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('kline')">K线图</div>
                <div class="tab" onclick="switchTab('heatmap')">热力图</div>
            </div>
            <div id="heatmapContainer" style="display: none;">
                <div class="chart-title">人生热力图（按维度）</div>
                <canvas id="heatmapChart" height="100"></canvas>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <div class="card-title">历史记录</div>
            <div id="historyList">
                <div class="empty-state">暂无历史记录</div>
            </div>
        </div>
    </div>

    <script>

        const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';

                ]},
                { id: 'c2', text: '面对问题时，你的思维方式是？', options: [
                    { label: 'A. 全面分析，善于创新', value: 90 },
                    { label: 'B. 理性思考，逻辑清晰', value: 75 },
                    { label: 'C. 思考较少，依赖经验', value: 50 },
                    { label: 'D. 思维混乱，容易纠结', value: 30 }
                ]},
                { id: 'c3', text: '你对新事物的接受程度？', options: [
                    { label: 'A. 积极拥抱，善于尝试', value: 90 },
                    { label: 'B. 愿意尝试，较为开放', value: 75 },
                    { label: 'C. 犹豫观望，不太敢试', value: 50 },
                    { label: 'D. 排斥拒绝，因循守旧', value: 30 }
                ]}
            ],
            life: [
                { id: 'l1', text: '你对目前的生活质量满意吗？', options: [
                    { label: 'A. 非常满意，生活幸福', value: 90 },
                    { label: 'B. 比较满意，还不错', value: 75 },
                    { label: 'C. 一般，不太满意', value: 50 },
                    { label: 'D. 不满意，很糟', value: 30 }
                ]},
                { id: 'l2', text: '你的工作/事业状态是？', options: [
                    { label: 'A. 很有成就感，充满热情', value: 90 },
                    { label: 'B. 还不错，有一定成就感', value: 75 },
                    { label: 'C. 一般，只是谋生', value: 50 },
                    { label: 'D. 很痛苦，想逃离', value: 25 }
                ]},
                { id: 'l3', text: '你的健康状况是？', options: [
                    { label: 'A. 身体很好，精力充沛', value: 90 },
                    { label: 'B. 还不错，偶尔小问题', value: 75 },
                    { label: 'C. 亚健康，有些问题', value: 50 },
                    { label: 'D. 健康状况较差', value: 30 }
                ]}
            ]
        };
        
        // 维度描述
        const dimensionDescriptions = {
            emotion: {
                good: '情绪管理能力强，心态积极乐观，人际关系和谐',
                normal: '情绪较为稳定，但有时会波动，需要更好地调节',
                bad: '情绪较为低落，建议关注心理健康，适当放松'
            },
            wealth: {
                good: '财务状况良好，有稳定的收入和储蓄规划',
                normal: '经济状况基本稳定，建议加强理财规划',
                bad: '财务压力较大，建议重新规划收支结构'
            },
            cognition: {
                good: '思维活跃，学习能力强，善于接受新事物',
                normal: '认知水平良好，保持持续学习的习惯会更好',
                bad: '建议多思考多学习，拓展思维和视野'
            },
            life: {
                good: '生活质量很高，工作和生活较为平衡',
                normal: '生活状态一般，可以尝试寻找更多幸福感',
                bad: '建议重新审视生活重心，调整状态'
            }
        };
        
        let currentDimension = 'emotion';
        let answers = {};
        let completedDimensions = new Set();
        let dailyAnswers = {};
        let evaluationData = null;
        let kLineChart = null;
        let radarChart = null;
        let heatmapChart = null;
        let currentTab = 'kline';
        
        // 初始化图表
        function initCharts() {
            const ctx1 = document.getElementById('kLineChart').getContext('2d');
            kLineChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '综合指数',
                        data: [],
                        borderColor: '#ff6600',
                        backgroundColor: 'rgba(255, 102, 0, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: '#ff6600'
                    }, {
                        label: '情绪指数',
                        data: [],
                        borderColor: '#00ff00',
                        backgroundColor: 'transparent',
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#00ff00'
                    }, {
                        label: '财富指数',
                        data: [],
                        borderColor: '#ffaa00',
                        backgroundColor: 'transparent',
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#ffaa00'
                    }, {
                        label: '认知指数',
                        data: [],
                        borderColor: '#4488ff',
                        backgroundColor: 'transparent',
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#4488ff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#888' }
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            grid: { color: '#2a2a2a' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { color: '#2a2a2a' },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
            
            // 雷达图
            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            radarChart = new Chart(ctxRadar, {
                type: 'radar',
                data: {
                    labels: ['情绪', '财富', '认知', '生活'],
                    datasets: [{
                        label: '当前状态',
                        data: [0, 0, 0, 0],
                        backgroundColor: 'rgba(255, 102, 0, 0.3)',
                        borderColor: '#ff6600',
                        pointBackgroundColor: '#ff6600',
                        pointBorderColor: '#fff',
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: {
                                display: false
                            },
                            grid: {
                                color: '#2a2a2a'
                            },
                            angleLines: {
                                color: '#2a2a2a'
                            },
                            pointLabels: {
                                color: '#fff',
                                font: {
                                    size: 14
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
            
            const ctx2 = document.getElementById('heatmapChart').getContext('2d');
            heatmapChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['情绪', '财富', '认知', '生活'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: [
                            'rgba(0, 255, 0, 0.7)',
                            'rgba(255, 170, 0, 0.7)',
                            'rgba(68, 136, 255, 0.7)',
                            'rgba(255, 102, 0, 0.7)'
                        ],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            grid: { color: '#2a2a2a' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }
        
        // 开始问卷
        function startQuestionnaire() {
            document.getElementById('startArea').style.display = 'none';
            document.getElementById('questionArea').style.display = 'block';
            currentDimension = 'emotion';
            completedDimensions.clear();
            renderQuestions();
            updateDimensionTabs();
            addMessage('请依次完成四个维度的问卷。点击上方标签切换维度，全部完成后点击「提交评估」。', 'ai');
        }
        
        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const dimensionQuestions = questions[currentDimension];
            
            let html = `<div class="question-block">
                <div class="question-title">${getDimensionName(currentDimension)} (3题选择题)</div>`;
            
            dimensionQuestions.forEach(q => {
                html += `<div class="input-group">
                    <label class="input-label">${q.text}</label>
                    <div class="options">`;
                q.options.forEach(opt => {
                    const isSelected = answers[q.id] === opt.value;
                    html += `<div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption('${q.id}', ${opt.value}, this)">${opt.label}</div>`;
                });
                html += `</div></div>`;
            });
            
            html += `</div>`;
            container.innerHTML = html;
        }
        
        // 获取维度名称
        function getDimensionName(dim) {
            const names = {
                emotion: '情绪状态',
                wealth: '财富状况',
                cognition: '认知水平',
                life: '生活满意度'
            };
            return names[dim] || dim;
        }
        
        // 选择选项
        function selectOption(questionId, value, element) {
            answers[questionId] = value;
            element.parentElement.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            
            // 标记该维度已完成
            const dim = questionId.charAt(0);
            const dimQuestions = { e: 'emotion', w: 'wealth', c: 'cognition', l: 'life' };
            const dimension = dimQuestions[dim];
            
            if (dimension) {
                const dimQs = questions[dimension].map(q => q.id);
                const answered = dimQs.filter(id => answers[id]).length;
                if (answered === 3) {
                    completedDimensions.add(dimension);
                }
            }
        }
        
        // 切换维度
        function switchDimension(dim) {
            currentDimension = dim;
            renderQuestions();
            updateDimensionTabs();
        }
        
        // 显示每日打卡
        function showDaily() {
            document.getElementById('questionArea').style.display = 'none';
            document.getElementById('dailyArea').style.display = 'block';
            updateDimensionTabs('daily');
        }
        
        // 更新维度标签
        function updateDimensionTabs(activeDim) {
            const dim = activeDim || currentDimension;
            document.querySelectorAll('.dimension-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.dimension === dim) {
                    tab.classList.add('active');
                }
            });
        }
        
        // 提交答案
        async function submitAnswers() {
            // 检查是否完成所有维度
            const requiredQuestions = ['e1', 'e2', 'e3', 'w1', 'w2', 'w3', 'c1', 'c2', 'c3', 'l1', 'l2', 'l3'];
            const missing = requiredQuestions.filter(q => !answers[q]);
            
            if (missing.length > 0) {
                alert('请完成所有12道选择题！');
                return;
            }
            
            document.getElementById('statusDot').classList.add('waiting');
            document.getElementById('statusText').textContent = 'AI评估中...';
            
            // 计算各维度分数
            const emotionScore = Math.round((answers.e1 + answers.e2 + answers.e3) / 3);
            const wealthScore = Math.round((answers.w1 + answers.w2 + answers.w3) / 3);
            const cognitionScore = Math.round((answers.c1 + answers.c2 + answers.c3) / 3);
            const lifeScore = Math.round((answers.l1 + answers.l2 + answers.l3) / 3);
            
            // 调用AI生成评估
            const systemPrompt = `你是一个人生阶段评估AI助手。请根据用户的问卷答案，给出综合评估。

用户问卷数据：
- 情绪状态：${emotionScore}分
- 财富状况：${wealthScore}分  
- 认知水平：${cognitionScore}分
- 生活满意度：${lifeScore}分

请返回JSON格式的评估结果：
{"emotion": 分数, "wealth": 分数, "cognition": 分数, "life": 分数, "phase": "波峰/波谷/平缓/上升期/下降期", "summary": "简短总结(50字以内)"}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{ role: 'user', content: systemPrompt }],
                        temperature: 0.7,
                        max_tokens: 512
                    })
                });
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                try {
                    const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        evaluationData = JSON.parse(jsonMatch[0]);
                    }
                } catch (e) {
                    evaluationData = {
                        emotion: emotionScore,
                        wealth: wealthScore,
                        cognition: cognitionScore,
                        life: lifeScore,
                        phase: getPhase(emotionScore, wealthScore, cognitionScore, lifeScore),
                        summary: '基于问卷评估的人生阶段'
                    };
                }
                
                updateEvaluation(evaluationData);
                
            } catch (error) {
                evaluationData = {
                    emotion: emotionScore,
                    wealth: wealthScore,
                    cognition: cognitionScore,
                    life: lifeScore,
                    phase: getPhase(emotionScore, wealthScore, cognitionScore, lifeScore),
                    summary: '基于问卷评估的人生阶段'
                };
                updateEvaluation(evaluationData);
                console.error(error);
            }
            
            document.getElementById('statusDot').classList.remove('waiting');
            document.getElementById('statusText').textContent = '评估完成';
        }
        
        // 根据分数判断阶段
        function getPhase(emotion, wealth, cognition, life) {
            const avg = (emotion + wealth + cognition + life) / 4;
            if (avg >= 80) return '波峰';
            if (avg >= 60) return '上升期';
            if (avg >= 40) return '平缓';
            if (avg >= 25) return '下降期';
            return '波谷';
        }
        
        // 获取描述
        function getDimensionDesc(dim, score) {
            const desc = dimensionDescriptions[dim];
            if (score >= 75) return desc.good;
            if (score >= 50) return desc.normal;
            return desc.bad;
        }
        
        // 更新评估结果显示
        function updateEvaluation(data) {
            document.getElementById('evaluationResult').style.display = 'block';
            
            const phaseBadge = document.getElementById('phaseBadge');
            phaseBadge.textContent = data.phase;
            phaseBadge.className = 'result-phase';
            
            if (data.phase === '波峰') phaseBadge.classList.add('peak');
            else if (data.phase === '波谷') phaseBadge.classList.add('valley');
            else if (data.phase === '平缓') phaseBadge.classList.add('flat');
            else if (data.phase.includes('上升')) phaseBadge.classList.add('rise');
            else if (data.phase.includes('下降')) phaseBadge.classList.add('fall');
            
            document.getElementById('phaseSummary').textContent = data.summary;
            
            // 更新雷达图
            radarChart.data.datasets[0].data = [data.emotion, data.wealth, data.cognition, data.life];
            radarChart.update();
            
            // 更新热力图
            heatmapChart.data.datasets[0].data = [data.emotion, data.wealth, data.cognition, data.life];
            heatmapChart.update();
            
            // 生成详细维度卡片
            const dimensionDetail = document.getElementById('dimensionDetail');
            const dimensions = [
                { key: 'emotion', name: '情绪状态', score: data.emotion, icon: '😊' },
                { key: 'wealth', name: '财富状况', score: data.wealth, icon: '💰' },
                { key: 'cognition', name: '认知水平', score: data.cognition, icon: '🧠' },
                { key: 'life', name: '生活满意度', score: data.life, icon: '🏠' }
            ];
            
            dimensionDetail.innerHTML = dimensions.map(dim => `
                <div class="dimension-card ${dim.key}">
                    <div class="dimension-header">
                        <span class="dimension-name">${dim.icon} ${dim.name}</span>
                        <span class="dimension-score">${dim.score}</span>
                    </div>
                    <div class="dimension-bar">
                        <div class="dimension-fill" style="width: ${dim.score}%"></div>
                    </div>
                    <div class="dimension-desc">${getDimensionDesc(dim.key, dim.score)}</div>
                </div>
            `).join('');
            
            // 更新K线图
            const today = new Date().toLocaleDateString('zh-CN');
            kLineChart.data.labels.push(today);
            kLineChart.data.datasets[0].data.push((data.emotion + data.wealth + data.cognition + data.life) / 4);
            kLineChart.data.datasets[1].data.push(data.emotion);
            kLineChart.data.datasets[2].data.push(data.wealth);
            kLineChart.data.datasets[3].data.push(data.cognition);
            kLineChart.update();
            
            // 提示完成
            addMessage('评估完成！🎉 点击「每日打卡」可以记录今天的状态。', 'ai');
            
            // 切换到每日打卡
            document.querySelector('[data-dimension="daily"]').click();
            
            // 保存到历史
            saveToHistory(data, today);
        }
        
        // 选择每日评级
        function selectRating(type, value) {
            dailyAnswers[type] = value;
            const group = document.getElementById(type + 'Rating');
            group.querySelectorAll('.rating-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (parseInt(btn.dataset.value) === value || btn.dataset.value === value) {
                    btn.classList.add('selected');
                }
            });
        }
        
        // 提交每日打卡
        function submitDailyCheck() {
            if (!dailyAnswers.work || !dailyAnswers.stress || !dailyAnswers.happiness || !dailyAnswers.growth) {
                alert('请完成所有每日评级！');
                return;
            }
            
            const today = new Date().toLocaleDateString('zh-CN');
            
            const workScores = { A: 95, B: 75, C: 50, D: 25 };
            const dailyScore = Math.round((
                workScores[dailyAnswers.work] + 
                (100 - dailyAnswers.stress * 8) + 
                dailyAnswers.happiness * 10 + 
                dailyAnswers.growth * 10
            ) / 4);
            
            const labels = kLineChart.data.labels;
            const lastDate = labels[labels.length - 1];
            
            if (lastDate === today) {
                kLineChart.data.datasets[0].data[kLineChart.data.datasets[0].data.length - 1] = dailyScore;
            } else {
                kLineChart.data.labels.push(today);
                kLineChart.data.datasets[0].data.push(dailyScore);
            }
            kLineChart.update();
            
            const history = JSON.parse(localStorage.getItem('lifeHistory') || '[]');
            history.unshift({
                date: today,
                type: 'daily',
                work: dailyAnswers.work,
                stress: dailyAnswers.stress,
                happiness: dailyAnswers.happiness,
                growth: dailyAnswers.growth,
                score: dailyScore,
                phase: dailyScore >= 80 ? '波峰' : dailyScore >= 60 ? '上升期' : dailyScore >= 40 ? '平缓' : dailyScore >= 25 ? '下降期' : '波谷'
            });
            localStorage.setItem('lifeHistory', JSON.stringify(history.slice(0, 30)));
            renderHistory();
            
            alert('今日打卡完成！📅');
            
            dailyAnswers = {};
            document.querySelectorAll('.rating-btn').forEach(btn => btn.classList.remove('selected'));
        }
        
        // 重置问卷
        function resetQuestionnaire() {
            answers = {};
            completedDimensions.clear();
            currentDimension = 'emotion';
            renderQuestions();
            updateDimensionTabs();
        }
        
        // 添加消息到界面
        function addMessage(content, type) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // 保存到历史记录
        function saveToHistory(data, date) {
            const history = JSON.parse(localStorage.getItem('lifeHistory') || '[]');
            history.unshift({ ...data, date, type: 'evaluation' });
            localStorage.setItem('lifeHistory', JSON.stringify(history.slice(0, 30)));
            renderHistory();
        }
        
        // 渲染历史记录
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('lifeHistory') || '[]');
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
                return;
            }
            
            container.innerHTML = history.map(item => {
                if (item.type === 'daily') {
                    return `<div class="history-item">
                        <div class="history-date">${item.date} · 每日打卡</div>
                        <div>工作:${item.work} 压力:${item.stress} 幸福:${item.happiness} 成长:${item.growth}</div>
                        <div style="color: var(--text-muted); margin-top: 8px;">综合得分: ${item.score}</div>
                    </div>`;
                }
                return `<div class="history-item">
                    <div class="history-date">${item.date} · ${item.phase}</div>
                    <div>情绪:${item.emotion} 财富:${item.wealth} 认知:${item.cognition} 生活:${item.life}</div>
                    <div style="color: var(--text-muted); margin-top: 8px;">${item.summary}</div>
                </div>`;
            }).join('');
        }
        
        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'heatmap') {
                document.getElementById('heatmapContainer').style.display = 'block';
            } else {
                document.getElementById('heatmapContainer').style.display = 'none';
            }
        }
        
        // 初始化
        initCharts();
        renderHistory();
    </script>
</body>
</html>
