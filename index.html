<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生K线图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #ff6600;
            --primary-dark: #cc5200;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #2a2a2a;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .chat-container {
            height: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.ai {
            background: var(--border);
            margin-right: auto;
        }
        
        .message.user {
            background: var(--primary);
            margin-left: auto;
        }
        
        .chat-input-area {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            font-family: inherit;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
        }
        
        .status-dot.waiting {
            background: #ffaa00;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .charts-container {
            display: grid;
            gap: 20px;
        }
        
        .chart-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        
        .chart-title {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--text-muted);
        }
        
        .evaluation-result {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .result-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .result-item {
            text-align: center;
            padding: 20px;
            background: var(--bg);
            border-radius: 12px;
        }
        
        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .result-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 8px;
        }
        
        .phase-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 20px;
        }
        
        .phase-peak { background: #00ff00; color: #000; }
        .phase-valley { background: #ff4444; color: #fff; }
        .phase-flat { background: #4488ff; color: #fff; }
        .phase-rise { background: #00ccff; color: #000; }
        .phase-fall { background: #ffaa00; color: #000; }
        
        .history-panel {
            margin-top: 20px;
        }
        
        .history-item {
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .history-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>人生K线图</h1>
            <p class="subtitle">AI智能评估 · 洞察人生轨迹</p>
        </header>
        
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">准备就绪</span>
        </div>
        
        <div class="main-content">
            <div class="card">
                <div class="card-title">AI 对话</div>
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai">
                            你好！我是人生K线图AI助手 🚀
                            <br><br>
                            我将通过对话了解你的情绪状态、财富状况、认知水平和生活满意度，然后为你生成专属的"人生K线图"。
                            <br><br>
                            请告诉我你最近的状态如何？
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="chatInput" rows="2" placeholder="请输入你的回答..."></textarea>
                    <button class="btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
            
            <div class="charts-container">
                <div class="chart-wrapper">
                    <div class="chart-title">人生K线图</div>
                    <canvas id="kLineChart" height="200"></canvas>
                </div>
                
                <div class="evaluation-result" id="evaluationResult" style="display: none;">
                    <div class="card-title">综合评估</div>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-value" id="emotionScore">-</div>
                            <div class="result-label">情绪指数</div>
                        </div>
                        <div class="result-item">
                            <div class="result-value" id="wealthScore">-</div>
                            <div class="result-label">财富指数</div>
                        </div>
                        <div class="result-item">
                            <div class="result-value" id="cognitionScore">-</div>
                            <div class="result-label">认知指数</div>
                        </div>
                        <div class="result-item">
                            <div class="result-value" id="lifeScore">-</div>
                            <div class="result-label">生活指数</div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <span class="phase-badge" id="phaseBadge">-</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('kline')">K线图</div>
                <div class="tab" onclick="switchTab('heatmap')">热力图</div>
            </div>
            <div id="heatmapContainer" style="display: none;">
                <div class="chart-title">人生热力图（按维度）</div>
                <canvas id="heatmapChart" height="100"></canvas>
                <div class="chart-title" style="margin-top: 20px;">人生热力图（按日期）</div>
                <canvas id="heatmapChart2" height="100"></canvas>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <div class="card-title">历史记录</div>
            <div id="historyList">
                <div class="empty-state">暂无历史记录</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '592e4aa06670474c9acccfa2e83163ea.Q4T2isVHICbBrBrM';
        const API_URL = 'https://api.siliconflow.cn/v1/chat/completions';
        
        let conversationHistory = [];
        let evaluationData = null;
        let kLineChart = null;
        let heatmapChart = null;
        let heatmapChart2 = null;
        let currentTab = 'kline';
        
        // 初始化图表
        function initCharts() {
            const ctx1 = document.getElementById('kLineChart').getContext('2d');
            kLineChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '综合指数',
                        data: [],
                        borderColor: '#ff6600',
                        backgroundColor: 'rgba(255, 102, 0, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: '#ff6600'
                    }, {
                        label: '情绪指数',
                        data: [],
                        borderColor: '#00ff00',
                        backgroundColor: 'transparent',
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#00ff00'
                    }, {
                        label: '财富指数',
                        data: [],
                        borderColor: '#ffaa00',
                        backgroundColor: 'transparent',
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#ffaa00'
                    }, {
                        label: '认知指数',
                        data: [],
                        borderColor: '#4488ff',
                        backgroundColor: 'transparent',
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#4488ff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#888' }
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            grid: { color: '#2a2a2a' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { color: '#2a2a2a' },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
            
            const ctx2 = document.getElementById('heatmapChart').getContext('2d');
            heatmapChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['情绪', '财富', '认知', '生活'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: [
                            'rgba(0, 255, 0, 0.7)',
                            'rgba(255, 170, 0, 0.7)',
                            'rgba(68, 136, 255, 0.7)',
                            'rgba(255, 102, 0, 0.7)'
                        ],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            grid: { color: '#2a2a2a' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message || sendBtn.disabled) return;
            
            // 添加用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 显示等待状态
            sendBtn.disabled = true;
            document.getElementById('statusDot').classList.add('waiting');
            document.getElementById('statusText').textContent = 'AI思考中...';
            
            conversationHistory.push({ role: 'user', content: message });
            
            // 构建提示词
            const systemPrompt = `你是一个人生阶段评估AI助手。你需要通过对话了解用户的以下几个维度：
1. 情绪状态（最近的情绪如何、是否稳定）
2. 财富状况（经济状况、收入水平）
3. 认知水平（思维状态、学习能力）
4. 生活满意度（整体生活质量、人际关系）

请根据用户的回答，进行友好的对话追问（最多2-3个问题），收集足够信息后给出评估。

当你认为收集到足够信息时，请以以下JSON格式返回评估结果：
{"emotion": 分数(0-100), "wealth": 分数(0-100), "cognition": 分数(0-100), "life": 分数(0-100), "phase": "波峰/波谷/平缓/上升期/下降期", "summary": "简短总结"}

注意：只有在明确告知用户评估完成时才返回JSON格式，其他时候用自然语言回复。`;
            
            conversationHistory.push({ role: 'system', content: systemPrompt });
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'Qwen/Qwen2.5-7B-Instruct',
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                conversationHistory.push({ role: 'assistant', content: aiResponse });
                addMessage(aiResponse, 'ai');
                
                // 检查是否是评估结果
                if (aiResponse.includes('{')) {
                    try {
                        const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            evaluationData = JSON.parse(jsonMatch[0]);
                            updateEvaluation(evaluationData);
                        }
                    } catch (e) {
                        console.log('解析评估结果失败', e);
                    }
                }
            } catch (error) {
                addMessage('抱歉，发生了错误，请稍后重试。', 'ai');
                console.error(error);
            }
            
            sendBtn.disabled = false;
            document.getElementById('statusDot').classList.remove('waiting');
            document.getElementById('statusText').textContent = '准备就绪';
        }
        
        // 添加消息到界面
        function addMessage(content, type) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // 更新评估结果
        function updateEvaluation(data) {
            document.getElementById('evaluationResult').style.display = 'block';
            
            document.getElementById('emotionScore').textContent = data.emotion;
            document.getElementById('wealthScore').textContent = data.wealth;
            document.getElementById('cognitionScore').textContent = data.cognition;
            document.getElementById('lifeScore').textContent = data.life;
            
            const badge = document.getElementById('phaseBadge');
            badge.textContent = data.phase;
            badge.className = 'phase-badge';
            
            if (data.phase === '波峰') badge.classList.add('phase-peak');
            else if (data.phase === '波谷') badge.classList.add('phase-valley');
            else if (data.phase === '平缓') badge.classList.add('phase-flat');
            else if (data.phase.includes('上升')) badge.classList.add('phase-rise');
            else if (data.phase.includes('下降')) badge.classList.add('phase-fall');
            
            // 更新K线图
            const today = new Date().toLocaleDateString('zh-CN');
            kLineChart.data.labels.push(today);
            kLineChart.data.datasets[0].data.push((data.emotion + data.wealth + data.cognition + data.life) / 4);
            kLineChart.data.datasets[1].data.push(data.emotion);
            kLineChart.data.datasets[2].data.push(data.wealth);
            kLineChart.data.datasets[3].data.push(data.cognition);
            kLineChart.update();
            
            // 更新热力图
            heatmapChart.data.datasets[0].data = [data.emotion, data.wealth, data.cognition, data.life];
            heatmapChart.update();
            
            // 保存到历史
            saveToHistory(data, today);
        }
        
        // 保存到历史记录
        function saveToHistory(data, date) {
            const history = JSON.parse(localStorage.getItem('lifeHistory') || '[]');
            history.unshift({ ...data, date });
            localStorage.setItem('lifeHistory', JSON.stringify(history.slice(0, 30)));
            renderHistory();
        }
        
        // 渲染历史记录
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('lifeHistory') || '[]');
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
                return;
            }
            
            container.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-date">${item.date} · ${item.phase}</div>
                    <div>情绪:${item.emotion} 财富:${item.wealth} 认知:${item.cognition} 生活:${item.life}</div>
                    <div style="color: var(--text-muted); margin-top: 8px;">${item.summary}</div>
                </div>
            `).join('');
        }
        
        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'heatmap') {
                document.getElementById('heatmapContainer').style.display = 'block';
            } else {
                document.getElementById('heatmapContainer').style.display = 'none';
            }
        }
        
        // 回车发送
        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // 初始化
        initCharts();
        renderHistory();
    </script>
</body>
</html>
